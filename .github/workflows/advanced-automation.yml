name: Advanced Project Automation

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: 'Advanced automation action'
        required: true
        default: 'full-analysis'
        type: choice
        options:
          - full-analysis
          - dependency-check
          - milestone-update
          - performance-report
          - team-notification

jobs:
  comprehensive-analysis:
    name: Comprehensive Project Analysis
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'full-analysis' || github.event.schedule
    permissions:
      issues: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Comprehensive Analysis
        run: |
          node scripts/advanced-automation.js full-analysis

  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'dependency-check'
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Dependencies
        run: |
          node scripts/advanced-automation.js dependency-check

  milestone-tracker:
    name: Milestone Progress Tracker
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'milestone-update'
    permissions:
      issues: write
      milestones: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update Milestones
        run: |
          node scripts/advanced-automation.js milestone-update

  performance-report:
    name: Performance & Metrics Report
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'performance-report'
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Performance Report
        run: |
          node scripts/advanced-automation.js performance-report

  team-notification:
    name: Team Status Notification
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'team-notification'
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Send Team Notification
        run: |
          node scripts/advanced-automation.js team-notification
