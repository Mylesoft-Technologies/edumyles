# Alert Rules for EduMyles
groups:
  - name: edumyles.rules
    rules:
      # Application Health Alerts
      - alert: ApplicationDown
        expr: up{job="edumyles-app"} == 0
        for: 1m
        labels:
          severity: critical
          service: edumyles-app
        annotations:
          summary: "EduMyles application is down"
          description: "EduMyles application has been down for more than 1 minute"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: edumyles-app
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: edumyles-app
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds"

      - alert: DatabaseConnectionFailure
        expr: mongodb_up == 0
        for: 1m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database connection failure"
          description: "MongoDB is not responding"

      - alert: RedisConnectionFailure
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis connection failure"
          description: "Redis is not responding"

      # Performance Alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 10
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Low disk space"
          description: "Disk space is {{ $value }}% full on {{ $labels.instance }}"

      # Business Metrics Alerts
      - alert: UserLoginFailures
        expr: rate(user_login_failures_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
          service: authentication
        annotations:
          summary: "High user login failure rate"
          description: "User login failure rate is {{ $value }} per second"

      - alert: PaymentFailures
        expr: rate(payment_failures_total[5m]) > 5
        for: 2m
        labels:
          severity: critical
          service: payments
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate is {{ $value }} per second"

      - alert: TenantIsolationViolation
        expr: rate(tenant_isolation_violations_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
          service: security
        annotations:
          summary: "Tenant isolation violation detected"
          description: "Tenant isolation violation rate is {{ $value }} per second"

      # Security Alerts
      - alert: SuspiciousActivity
        expr: rate(suspicious_requests_total[5m]) > 50
        for: 2m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "Suspicious activity detected"
          description: "Suspicious request rate is {{ $value }} per second"

      - alert: BruteForceAttack
        expr: rate(authentication_failures_total[1m]) > 100
        for: 1m
        labels:
          severity: critical
          service: security
        annotations:
          summary: "Possible brute force attack"
          description: "Authentication failure rate is {{ $value }} per second"

      # Database Performance Alerts
      - alert: DatabaseSlowQueries
        expr: mongodb_op_counters_total{type="query"} / mongodb_op_counters_total{type="command"} > 0.1
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Database slow queries detected"
          description: "Database query rate is {{ $value }}% of total operations"

      - alert: DatabaseConnectionsHigh
        expr: mongodb_connections{state="current"} > 80
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High database connections"
          description: "Database has {{ $value }} active connections"

      # Application Specific Alerts
      - alert: AssignmentSubmissionFailure
        expr: rate(assignment_submission_failures_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
          service: academics
        annotations:
          summary: "Assignment submission failures"
          description: "Assignment submission failure rate is {{ $value }} per second"

      - alert: EWalletTransactionFailure
        expr: rate(ewallet_transaction_failures_total[5m]) > 3
        for: 2m
        labels:
          severity: critical
          service: finance
        annotations:
          summary: "eWallet transaction failures"
          description: "eWallet transaction failure rate is {{ $value }} per second"

      # External Service Alerts
      - alert: ExternalAPIFailure
        expr: rate(external_api_failures_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
          service: external
        annotations:
          summary: "External API failures"
          description: "External API failure rate is {{ $value }} per second"

      - alert: EmailDeliveryFailure
        expr: rate(email_delivery_failures_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
          service: communications
        annotations:
          summary: "Email delivery failures"
          description: "Email delivery failure rate is {{ $value }} per second"
